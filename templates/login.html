{% extends "base.html" %}

{% block title %}Login - FlatlandBD{% endblock %}

{% block extra_css %}
{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-24 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-gold/5 rounded-full blur-3xl -z-10 animate-pulse"></div>
    
    <div class="w-full max-w-lg">
        <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] p-10 md:p-14 border border-glass-border shadow-strong relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-gold/5 rounded-full blur-2xl -mr-16 -mt-16"></div>
            
            <header class="text-center mb-12">
                <span class="inline-block px-4 py-1.5 rounded-full bg-brand-gold/10 text-brand-gold text-[10px] font-bold uppercase tracking-widest mb-4">Secure Access</span>
                <h2 class="text-3xl font-display font-bold text-brand-dark">Admin <span class="text-brand-gold">Login</span></h2>
            </header>

            <form action="{{ url_for('login', next=request.args.get('next')) }}" method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="space-y-2">
                    <label class="text-xs font-bold text-brand-dark/40 uppercase tracking-widest ml-1">Email Address</label>
                    <div class="relative group">
                        <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-brand-dark/20 group-focus-within:text-brand-gold transition-colors"></i>
                        <input type="email" name="email" required
                               class="w-full pl-12 pr-6 py-4 rounded-2xl bg-white border border-brand-dark/5 focus:border-brand-gold focus:ring-4 focus:ring-brand-gold/5 transition-all text-brand-dark placeholder:text-brand-dark/20"
                               placeholder="admin@flatlandbd.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-brand-dark/40 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-brand-dark/20 group-focus-within:text-brand-gold transition-colors"></i>
                        <input type="password" name="password" required
                               class="w-full pl-12 pr-6 py-4 rounded-2xl bg-white border border-brand-dark/5 focus:border-brand-gold focus:ring-4 focus:ring-brand-gold/5 transition-all text-brand-dark placeholder:text-brand-dark/20"
                               placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative w-5 h-5">
                            <input type="checkbox" name="remember" id="remember" class="peer hidden">
                            <div class="w-5 h-5 rounded-md border-2 border-brand-dark/10 peer-checked:bg-brand-gold peer-checked:border-brand-gold transition-all"></div>
                            <i class="fas fa-check absolute inset-0 text-[10px] text-white flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                        </div>
                        <span class="text-sm font-bold text-brand-dark/60 group-hover:text-brand-dark transition-colors">Remember me</span>
                    </label>
                    
                    <a href="#" class="text-sm font-bold text-brand-gold hover:text-brand-warm transition-colors">Forgot password?</a>
                </div>

                <button type="submit" class="btn-gold-tw w-full py-5 text-lg shadow-lg shadow-brand-gold/20">
                    Sign In to Portal
                </button>
            </form>

            <footer class="mt-12 pt-8 border-t border-brand-dark/5 text-center">
                <p class="text-[10px] font-bold text-brand-dark/40 uppercase tracking-widest">© 2024 FlatlandBD Admin Control</p>
            </footer>
        </div>
    </div>
</div>
{% endblock %}
