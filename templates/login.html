{% extends "base.html" %}

{% block title %}Login - FlatlandBD{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 450px;
        margin: 100px auto;
        padding: 40px;
        background: var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: var(--shadow-soft);
    }
    .form-control {
        background: rgba(255, 255, 255, 0.9) !important;
        border: 1px solid var(--glass-border) !important;
        color: var(--primary-dark) !important;
        padding: 12px;
        border-radius: 10px;
    }
    .form-control:focus {
        border-color: var(--accent-gold) !important;
        box-shadow: 0 0 10px rgba(213, 123, 76, 0.18);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="login-container reveal">
        <h2 class="text-center mb-4 fw-bold">Admin <span class="text-gold">Login</span></h2>
        
        <form action="{{ url_for('login', next=request.args.get('next')) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label small text-muted">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="arifulhaquerohan@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label small text-muted" for="remember">
                        Remember Me
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-gold w-100 py-3 fw-bold">
                Login
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="small text-muted mb-0">Admin access only.</p>
        </div>
    </div>
</div>
{% endblock %}
