{% extends "base.html" %}

{% block title %}Edit Interior Service - FlatlandBD{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 820px;
        margin: 50px auto;
        padding: 40px;
        background: var(--surface);
        border: 1px solid var(--glass-border);
        border-radius: 30px;
        box-shadow: var(--shadow-soft);
    }

    .form-label {
        font-weight: 600;
        color: var(--accent-gold);
        margin-bottom: 10px;
    }

    .custom-input {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--glass-border);
        color: var(--primary-dark);
        padding: 12px 20px;
        border-radius: 12px;
        margin-bottom: 18px;
    }

    .custom-input:focus {
        background: rgba(255, 255, 255, 0.98);
        border-color: var(--accent-gold);
        color: var(--primary-dark);
        box-shadow: 0 0 15px rgba(213, 123, 76, 0.15);
    }

    @media (max-width: 768px) {
        .form-container {
            margin: 30px 0;
            padding: 24px;
            border-radius: 22px;
        }

        .custom-input {
            margin-bottom: 14px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="form-container reveal">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div>
                <h2 class="fw-bold mb-1">Edit Interior Service</h2>
                <p class="text-muted mb-0">Update studio details and status.</p>
            </div>
            <a href="{{ url_for('admin_dashboard', tab='services') }}" class="btn btn-outline-light">Back to Admin</a>
        </div>

        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-12">
                    <label class="form-label">Company/Designer Name</label>
                    <input type="text" name="provider_name" class="form-control custom-input" value="{{ item.provider_name }}" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Service Type</label>
                    <input type="text" name="service_type" class="form-control custom-input" value="{{ item.service_type }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Starting Price (BDT)</label>
                    <input type="number" name="starting_price" step="any" class="form-control custom-input" value="{{ item.starting_price }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select custom-input">
                        <option value="pending" {% if item.status == 'pending' %}selected{% endif %}>Pending</option>
                        <option value="approved" {% if item.status == 'approved' %}selected{% endif %}>Approved</option>
                        <option value="rejected" {% if item.status == 'rejected' %}selected{% endif %}>Rejected</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Portfolio Link</label>
                    <input type="url" name="portfolio_url" class="form-control custom-input" value="{{ item.portfolio_url or '' }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">About Your Services</label>
                    <textarea name="description" class="form-control custom-input" rows="4">{{ item.description }}</textarea>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Image URL</label>
                    <input type="text" name="image_url" class="form-control custom-input" value="{{ item.image_url or '' }}">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Upload New Image</label>
                    <input type="file" name="image_file" class="form-control custom-input" accept="image/png,image/jpeg,image/webp">
                    <small class="text-muted d-block">Uploading a file replaces the current image.</small>
                </div>
                <div class="col-md-12">
                    <button type="submit" class="btn btn-gold w-100 py-3 mt-2">Save Changes</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
