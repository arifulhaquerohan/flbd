{% extends "base.html" %}

{% block title %}Page Not Found - FlatlandBD{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center relative overflow-hidden bg-brand-soft">
    <!-- Background Decor -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-brand-gold/10 rounded-full blur-[100px] -mr-20 -mt-20 pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-brand-dark/5 rounded-full blur-[100px] -ml-20 -mb-20 pointer-events-none"></div>

    <div class="relative z-10 text-center px-4 max-w-2xl mx-auto">
        <h1 class="text-9xl font-display font-medium text-brand-gold/20 select-none mb-4">404</h1>
        <h2 class="text-4xl md:text-5xl font-display text-brand-dark mb-6">Page Not Found</h2>
        <p class="text-lg text-brand-dark/60 font-light mb-10 leading-relaxed">
            The residence you are looking for seems to have moved or does not exist. 
            Let us guide you back to familiar grounds.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('index') }}" class="btn-gold-tw">
                <i class="fas fa-home mr-2"></i> Return Home
            </a>
            <a href="{{ url_for('flats') }}" class="px-6 py-3 rounded-xl bg-white border border-glass-border text-brand-dark font-bold hover:bg-brand-soft transition-all shadow-sm">
                Browse Flats
            </a>
        </div>
    </div>
</section>
{% endblock %}
